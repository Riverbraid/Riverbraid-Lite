name: Riverbraid Verification Suite
on:
  push:
  pull_request:
jobs:
  verify-integrity:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.0'
      - name: Execute Lite Ring 2 verifier
        run: node verify.mjs